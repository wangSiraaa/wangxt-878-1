services:
  mysql:
    image: mysql:8.0.36
    container_name: cargo-uld-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: cargo_uld
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --innodb_lock_wait_timeout=120
      - --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cargo-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cargo-uld-backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: "123456"
      JWT_SECRET: "cargo-uld-review-super-secret-key-for-jwt-token-generation-2024-production"
      JWT_EXPIRATION: "86400000"
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cargo-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cargo-uld-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cargo-net

volumes:
  mysql_data:

networks:
  cargo-net:
    driver: bridge
