server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: cargo-uld-review
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/cargo_uld?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:cargo-uld-review-super-secret-key-for-jwt-token-generation-2024}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer

logging:
  level:
    root: INFO
    com.cargo.uld: DEBUG
    org.springframework.security: DEBUG
